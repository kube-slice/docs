name: Spellcheck Action
on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  build:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      # The checkout step
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: rojopolis/spellcheck-github-actions@dbd2f1da869c05ad874fffeb6fe1ed50cd1a6e98 # 0.36.0
        name: Spellcheck
        with:
          config_path: spellcheck.yml # put path to configuration file here
          output_file: spellcheck-output.txt
      - uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        if: '!cancelled()' # Do not upload artifact if job was cancelled
        with:
          name: Spellcheck Output
          path: spellcheck-output.txt